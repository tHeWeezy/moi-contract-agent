<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户信息列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'Noto Sans SC', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 50: '#EBF5FF', 100: '#D6EBFF', 500: '#128BED', 600: '#0E6FBE' },
            surface: { 50: '#F8FAFC', 100: '#F1F5F9' },
            danger: { 50: '#FEF2F2', 500: '#D0021B' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }
    .card-hover { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.04); }
    @media (prefers-reduced-motion: reduce) { .card-hover:hover { transform: none; } .card-hover { transition: none; } }
  </style>
</head>
<body class="bg-surface-50 min-h-screen antialiased text-slate-800">

  <div class="max-w-screen-2xl mx-auto py-8 px-4 sm:px-6 lg:px-10">

    <!-- Header Card: Title + Search + Filter -->
    <div class="bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 px-6 py-6 mb-8 hover:shadow-md transition-shadow duration-300">
      <div class="flex items-center justify-between flex-col sm:flex-row gap-4">
        <div class="flex items-center gap-4">
          <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-gradient-to-br from-brand-50 to-brand-100 flex items-center justify-center shadow-sm">
            <svg class="w-6 h-6 text-brand-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z"/></svg>
          </div>
          <div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">客户管理</h1>
            <p class="text-sm text-slate-600 mt-0.5">共 <span id="customer-count" class="font-semibold text-slate-900">0</span> 家客户</p>
          </div>
        </div>
        <div class="flex items-center gap-3 w-full sm:w-auto">
          <div class="relative flex-1 sm:flex-initial">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
            <input id="search-input" type="text" placeholder="搜索公司名称..." aria-label="搜索客户"
              class="w-full sm:w-80 pl-10 pr-4 py-2.5 text-sm bg-surface-50 rounded-xl ring-1 ring-inset ring-slate-200 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all duration-200">
          </div>
          <select id="status-filter" aria-label="筛选经营状态"
            class="px-4 py-2.5 text-sm bg-surface-50 rounded-xl ring-1 ring-inset ring-slate-200 text-slate-700 font-medium focus:outline-none focus:ring-2 focus:ring-brand-500 cursor-pointer transition-all duration-200 hover:bg-slate-100">
            <option value="">全部状态</option>
            <option value="存续">存续</option>
            <option value="正常">正常</option>
            <option value="注销">注销</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Customer Cards Grid -->
    <div id="customer-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-20">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-slate-100 mb-4">
        <svg class="w-8 h-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
      </div>
      <p class="text-base font-medium text-slate-900 mb-1">未找到匹配的客户</p>
      <p class="text-sm text-slate-500">请尝试调整搜索条件或筛选器</p>
    </div>
  </div>

  <script>
    // ========== Mock Customer Data ==========
    const customers = [
      {
        id: 1,
        companyName: '张三李四股份有限公司',
        status: '存续',
        internalRating: 'AAA',
        industry: '建筑信息化',
        legalRepresentative: '王五',
        creditCode: '91110105XXXXXXXXXX',
        registeredCapital: 10000,
        cooperationAmount: 4500,
        overdueAmount: 30,
        overdueRatio: '2.5%',
        city: '北京市朝阳区'
      },
      {
        id: 2,
        companyName: '东方科技集团有限公司',
        status: '存续',
        internalRating: 'AA',
        industry: '信息技术服务',
        legalRepresentative: '李明',
        creditCode: '91310115XXXXXXXXXX',
        registeredCapital: 50000,
        cooperationAmount: 12000,
        overdueAmount: 0,
        overdueRatio: '0.0%',
        city: '上海市浦东新区'
      },
      {
        id: 3,
        companyName: '华创智能装备有限公司',
        status: '正常',
        internalRating: 'A',
        industry: '智能制造',
        legalRepresentative: '赵强',
        creditCode: '91440300XXXXXXXXXX',
        registeredCapital: 5000,
        cooperationAmount: 800,
        overdueAmount: 15,
        overdueRatio: '1.8%',
        city: '深圳市南山区'
      },
      {
        id: 4,
        companyName: '鑫源国际贸易有限公司',
        status: '存续',
        internalRating: 'BBB',
        industry: '国际贸易',
        legalRepresentative: '陈芳',
        creditCode: '91110108XXXXXXXXXX',
        registeredCapital: 3000,
        cooperationAmount: 2200,
        overdueAmount: 180,
        overdueRatio: '8.2%',
        city: '北京市海淀区'
      },
      {
        id: 5,
        companyName: '绿洲环保科技股份有限公司',
        status: '存续',
        internalRating: 'AA',
        industry: '环保科技',
        legalRepresentative: '周涛',
        creditCode: '91330100XXXXXXXXXX',
        registeredCapital: 8000,
        cooperationAmount: 3600,
        overdueAmount: 0,
        overdueRatio: '0.0%',
        city: '杭州市西湖区'
      },
      {
        id: 6,
        companyName: '中联建设工程有限公司',
        status: '注销',
        internalRating: 'C',
        industry: '建筑工程',
        legalRepresentative: '吴刚',
        creditCode: '91500000XXXXXXXXXX',
        registeredCapital: 2000,
        cooperationAmount: 150,
        overdueAmount: 320,
        overdueRatio: '45.0%',
        city: '重庆市渝中区'
      }
    ];

    // ========== Utility ==========
    function formatMoney(value) {
      if (value === null || value === undefined || typeof value !== 'number' || isNaN(value)) return '--';
      return value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderBadge(text, variant) {
      const styles = {
        success: 'bg-emerald-50 text-emerald-700 ring-1 ring-inset ring-emerald-600/20 shadow-sm',
        primary: 'bg-gradient-to-r from-brand-500 to-brand-600 text-white shadow-md shadow-brand-500/25',
        secondary: 'bg-gradient-to-r from-purple-500 to-purple-600 text-white shadow-md shadow-purple-500/25',
        danger: 'bg-red-50 text-red-700 ring-1 ring-inset ring-red-600/20 shadow-sm',
        muted: 'bg-slate-100 text-slate-600 ring-1 ring-inset ring-slate-300/50'
      };
      return '<span class="inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 ' + (styles[variant] || styles.muted) + '">' + text + '</span>';
    }

    function getStatusVariant(status) {
      if (status === '存续' || status === '正常') return 'success';
      if (status === '注销') return 'muted';
      return 'muted';
    }

    function getRatingColor(rating) {
      if (rating === 'AAA') return 'text-brand-500 font-bold';
      if (rating.startsWith('AA')) return 'text-brand-600 font-semibold';
      if (rating.startsWith('A')) return 'text-emerald-600 font-semibold';
      if (rating.startsWith('B')) return 'text-amber-600 font-semibold';
      return 'text-red-600 font-semibold';
    }

    // ========== Render Card ==========
    function renderCard(customer) {
      const statusBadge = renderBadge(customer.status, getStatusVariant(customer.status));
      const hasOverdue = customer.overdueAmount > 0;

      return '' +
        '<a href="index.html?id=' + customer.id + '" class="card-hover block bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 overflow-hidden cursor-pointer focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2">' +
          // Card Header
          '<div class="px-6 pt-6 pb-4">' +
            '<div class="flex items-start justify-between gap-3">' +
              '<div class="flex items-start gap-3 min-w-0">' +
                '<div class="flex-shrink-0 w-11 h-11 rounded-xl bg-gradient-to-br from-brand-50 to-brand-100 flex items-center justify-center shadow-sm">' +
                  '<svg class="w-5 h-5 text-brand-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>' +
                '</div>' +
                '<div class="min-w-0">' +
                  '<h3 class="text-base font-semibold text-slate-900 truncate leading-tight">' + customer.companyName + '</h3>' +
                  '<div class="mt-2 flex items-center gap-1.5">' + statusBadge + '</div>' +
                '</div>' +
              '</div>' +
              '<div class="flex-shrink-0">' +
                '<span class="text-xl ' + getRatingColor(customer.internalRating) + '">' + customer.internalRating + '</span>' +
              '</div>' +
            '</div>' +
            // Key info fields (synced with detail page header)
            '<div class="mt-4 space-y-2 text-xs text-slate-500">' +
              '<div class="flex items-center gap-2">' +
                '<svg class="w-3.5 h-3.5 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>' +
                '<span>法定代表人：<span class="text-slate-700 font-medium">' + customer.legalRepresentative + '</span></span>' +
              '</div>' +
              '<div class="flex items-center gap-2">' +
                '<svg class="w-3.5 h-3.5 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0 1 12 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 0 1-.673-.38m0 0A2.18 2.18 0 0 1 3 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 0 1 3.413-.387m7.5 0V5.25A2.25 2.25 0 0 0 13.5 3h-3a2.25 2.25 0 0 0-2.25 2.25v.894m7.5 0a48.667 48.667 0 0 0-7.5 0M12 12.75h.008v.008H12v-.008Z"/></svg>' +
                '<span>所属行业：<span class="text-slate-700 font-medium">' + customer.industry + '</span></span>' +
              '</div>' +
              '<div class="flex items-center gap-2">' +
                '<svg class="w-3.5 h-3.5 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z"/></svg>' +
                '<span class="truncate">统一信用代码：<span class="text-slate-700 font-medium tabular-nums">' + customer.creditCode + '</span></span>' +
              '</div>' +
            '</div>' +
          '</div>' +
          // Divider
          '<div class="border-t border-slate-100"></div>' +
          // Card Body - Financial Metrics
          '<div class="px-6 py-5">' +
            '<div class="grid grid-cols-3 gap-5">' +
              // Registered Capital
              '<div>' +
                '<p class="text-xs text-slate-400 mb-1.5 font-medium">注册资本</p>' +
                '<p class="text-sm font-semibold text-slate-800 tabular-nums">' + formatMoney(customer.registeredCapital) + ' <span class="text-xs text-slate-400 font-normal">万</span></p>' +
              '</div>' +
              // Cooperation Amount
              '<div>' +
                '<p class="text-xs text-slate-400 mb-1.5 font-medium">合作金额</p>' +
                '<p class="text-sm font-semibold text-slate-800 tabular-nums">' + formatMoney(customer.cooperationAmount) + ' <span class="text-xs text-slate-400 font-normal">万</span></p>' +
              '</div>' +
              // Overdue with ratio
              '<div>' +
                '<p class="text-xs text-slate-400 mb-1.5 font-medium">逾期金额</p>' +
                '<p class="text-sm font-semibold tabular-nums ' + (hasOverdue ? 'text-danger-500' : 'text-slate-800') + '">' +
                  formatMoney(customer.overdueAmount) + ' <span class="text-xs font-normal ' + (hasOverdue ? 'text-red-400' : 'text-slate-400') + '">万</span>' +
                '</p>' +
                '<p class="text-xs tabular-nums mt-1 ' + (hasOverdue ? 'text-red-400' : 'text-slate-400') + '">占比 ' + customer.overdueRatio + '</p>' +
              '</div>' +
            '</div>' +
          '</div>' +
          // Card Footer
          '<div class="px-6 py-4 bg-gradient-to-br from-slate-50/80 to-slate-50/40 border-t border-slate-100">' +
            '<div class="flex items-center justify-between">' +
              '<span class="inline-flex items-center gap-1.5 text-xs text-slate-500 font-medium">' +
                '<svg class="w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>' +
                (customer.city || '--') +
              '</span>' +
              '<span class="inline-flex items-center gap-1 text-xs text-brand-500 font-semibold group-hover:gap-2 transition-all duration-200">' +
                '查看详情' +
                '<svg class="w-3.5 h-3.5 transition-transform duration-200 group-hover:translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>' +
              '</span>' +
            '</div>' +
          '</div>' +
        '</a>';
    }

    // ========== Render List ==========
    function renderCustomerList(filteredCustomers) {
      const grid = document.getElementById('customer-grid');
      const empty = document.getElementById('empty-state');
      const count = document.getElementById('customer-count');

      count.textContent = filteredCustomers.length;

      if (filteredCustomers.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      grid.innerHTML = filteredCustomers.map(renderCard).join('');
    }

    // ========== Filter Logic ==========
    function applyFilters() {
      const query = document.getElementById('search-input').value.trim().toLowerCase();
      const status = document.getElementById('status-filter').value;

      const filtered = customers.filter(function(c) {
        const matchName = !query || c.companyName.toLowerCase().includes(query);
        const matchStatus = !status || c.status === status;
        return matchName && matchStatus;
      });

      renderCustomerList(filtered);
    }

    // ========== Init ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderCustomerList(customers);
      document.getElementById('search-input').addEventListener('input', applyFilters);
      document.getElementById('status-filter').addEventListener('change', applyFilters);
    });
  </script>

</body>
</html>
